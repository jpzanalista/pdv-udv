# Evolution API (WhatsApp) — atrás do nginx-proxy + acme-companion já existentes na VPS.
# Sobe SEPARADO do PDV (stack própria, com Postgres e Redis dedicados).
#
#   1) No .env: EVOLUTION_AUTH_KEY=<openssl rand -hex 24>
#   2) docker compose -f docker-compose.evolution.yml up -d
#   3) Abra https://evolution.emporio.cloud/manager  (usa a mesma chave para logar)
#   4) Crie uma instância, escaneie o QR com o WhatsApp do empório
#   5) No .env do PDV: EVOLUTION_URL / EVOLUTION_INSTANCE / EVOLUTION_API_KEY
services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    environment:
      SERVER_URL: https://evolution.emporio.cloud
      # A chave vem do .env (EVOLUTION_AUTH_KEY) — gere com: openssl rand -hex 24
      AUTHENTICATION_API_KEY: ${EVOLUTION_AUTH_KEY}
      # Banco (persiste instâncias/mensagens)
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@evolution-postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'false'
      DATABASE_SAVE_MESSAGE_UPDATE: 'false'
      DATABASE_SAVE_DATA_CONTACTS: 'false'
      DATABASE_SAVE_DATA_CHATS: 'false'
      # Cache Redis
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://evolution-redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: 'true'
      CACHE_LOCAL_ENABLED: 'false'
      # Sessão / QR
      QRCODE_LIMIT: '30'
      DEL_INSTANCE: 'false'
      LOG_LEVEL: ERROR
      # Modo "número automático": rejeita ligações e ignora grupos
      REJECT_CALL: 'true'
      MSG_CALL: 'Este é um número automático de notificações. Ligações não são atendidas.'
      GROUPS_IGNORE: 'true'
      # Publicação via nginx-proxy (Evolution escuta na 8080)
      VIRTUAL_HOST: evolution.emporio.cloud
      VIRTUAL_PORT: '8080'
      LETSENCRYPT_HOST: evolution.emporio.cloud
    volumes:
      - evolution_instances:/evolution/instances
    networks: [evo_internal, proxy_network]

  evolution-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data
    networks: [evo_internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evolution -d evolution']
      interval: 5s
      timeout: 5s
      retries: 10

  evolution-redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - evolution_redis:/data
    networks: [evo_internal]

networks:
  evo_internal:
  proxy_network:
    external: true

volumes:
  evolution_instances:
  evolution_pgdata:
  evolution_redis:
